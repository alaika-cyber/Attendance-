version: "3.9"

services:
  api:
    build:
      context: ./backend
    container_name: attendance-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/data:/app/data

  nginx:
    image: nginx:1.27-alpine
    container_name: attendance-nginx
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
